<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Finance Tracker{% endblock %}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
      <div class="container">
        <a class="navbar-brand" href="{% url 'dashboard' %}">Finance Tracker</a>
        {% if user.is_authenticated %}
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarContent">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="{% url 'dashboard' %}">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'movimientos' %}">Movimientos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'tarjetas' %}">Tarjetas</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'conceptos' %}">Conceptos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'tipos' %}">Tipos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{% url 'presupuestos' %}"
                >Presupuestos</a
              >
            </li>
          </ul>
          <span class="text-white me-3">{{ user.username }}</span>
          <a class="btn btn-outline-light btn-sm" href="{% url 'logout' %}"
            >Salir</a
          >
        </div>
        {% endif %}
      </div>
    </nav>

    <main class="container pb-5">
      {% for message in messages %}
      <div
        class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show"
        role="alert"
      >
        {{ message }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %} {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
